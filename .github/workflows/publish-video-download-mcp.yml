name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/video-download-mcp

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: packages/video-download-mcp/package-lock.json

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Show upgraded npm version
        run: npm -v

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm publish --access public
